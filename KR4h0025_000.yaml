front:
  text: 西崑唱和詩人姓氏
  hash: sha256:6a1022856eee97d67efa954339152c4f282853d7a8f85b2c9601557f8268ec18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0025_SBCK_000-1a}
body:
  text: 楊億翰林學士左司諌知制誥劉筠大理評事祕閣校理錢惟演太僕少卿直祕閣李宗諤翰林學士陳越著作佐郎直史館李維戶部貟外郎直集賢院劉隲工部貟外郎直集賢院丁謂樞密直學士刁衎駕部貟外郎直祕閣元闕張詠樞密直學士錢惟濟恩州刺史任隨舒雅職方貟外郎袐閣校理監舒州靈仙觀朝逈翰林學士崔遵度左司諌直史館薛映右諌議大夫秉刋西崑詩集序論詩者類知宗盛唐黜晚唐斯二體信有辨矣然詩道性情古人采之觀風正樂以在治忽者也如不得作者之意徒曰盛唐盛唐豫不知直似盛唐亦何以也杜少陵盛唐之祖也李義山晚唐之冠也體相懸絶矣荆國乃謂唐人學杜者惟義山得其藩籬此可以意會矣楊劉諸公倡和西崑集蓋學義山而過者六一翁恐其流靡不返故以優遊坦夷之辭矯而變之其功不可少然亦朱嘗不有取于崑體也徂徠冷齊著為怪說詩厄和者又從而張之崑體遂廢其實何可廢也夫子一嘆由瑟門人不敬子路信耳者難以言喻如此故曰遊于藝夫誠以藝遊晚唐亦可也不然盛唐猶是物也奚得于彼哉要必有為之根源者耳子美云文章一小技於道未為尊作者之言蓋如此夫惟逹宣聖遊藝之㫖審杜老技道之序味介甫藩籬之說而得歐公變崑之意詩道其庶矣乎嘉靖丁酉臘日高郵張綖序西崑酬唱集序翰林學士戶部郎中知制誥楊億述余景德中忝佐修書之任得接羣公之逰時今紫微錢君希聖祕閣劉君子儀並負懿文尤精雅道雕章麗句膾炙人口豫得以遊其墻藩而咨其模楷二君成人之美不我遐棄博約誘掖置之同聲因以㦄覽遺編研味前作挹其芳潤發於希慕更迭唱和互相切劘而豫以固陋之姿參酬繼之末入蘭遊霧雖獲益以居多觀海學山嘆知量而中止既恨其不至又犯乎不韙雖榮於託驥亦愧乎續貂間然於茲顔厚何已凡五七言律詩二百四十七章其屬而和者又十有五人析為二卷取玉山䇿府之名命之曰西崑酬唱集云爾
  hash: sha256:bd51871af0f2e2683a05720981a76179a28a75fc051311c6263f89aabba0b9de
