front:
  text: 西崑唱和詩人姓氏
  hash: sha256:6a1022856eee97d67efa954339152c4f282853d7a8f85b2c9601557f8268ec18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0025_SBCK_000-1a}
body:
  text: 楊億翰林學士左司諌知制誥劉筠大理評事秘閣校理錢惟演太僕少卿直秘閣李宗諤翰林學士陳越著作佐􅀰直史舘李維戸部貟外􅀰直集賢院劉隲工部貟外􅀰直集賢院丁謂樞宻直學士刁衎駕部貟外􅀰直秘閣元闕張詠樞宻直學士錢惟濟恩州刺史任隨舒雅職方貟外􅀰袐閣校理􅁥舒州靈仙觀晁逈翰林學士崔遵度左司諌直史舘薛映右諌議大夫秉刋西崑詩集序論詩者􅁼知宗盛唐黜晚唐斯二體信有辨矣然詩道性情古人采之觀風正樂以在治忽者也如不得作者之意徒曰盛唐盛唐予不知直似盛唐亦何以也杜少陵盛唐之祖也李義山晚唐之冠也體相懸絶矣荆國乃謂唐人學杜者惟義山得其藩籬此可以意會矣楊劉諸公倡和西崑集盖學義山而過者六一翁恐其流靡不返故以優㳺坦夷之辭矯而變之其功不可少然亦朱嘗不有取于崑體也徂徠冷齋著爲怪說詩厄和者又從而張之崑體遂廢其實何可廢也夫子一嘆由瑟門人不敬子路信耳者難以言喻如此故曰㳺于藝夫誠以藝㳺晚唐亦可也不然盛唐猶是物也奚得于彼哉要必有爲之根源者耳子羙云文章一小技於道未爲尊作者之言盖如此夫惟逹宣聖㳺藝之㫖審杜老技道之序味介甫藩籬之􅀃而得歐公變崑之意詩道其庻矣乎嘉靖丁酉臘日高郵張綖序西崑詶唱集序翰林學士戸部􅀰中知制誥楊億述余景徳中忝佐脩書之任得接羣公之逰時今紫㣲錢君希聖祕閣劉君子儀並􅀒懿文􅀹精雅道雕章麗句膾炙人口予得以㳺其墻藩而咨其模楷二君成人之羙不我遐棄愽約誘掖寘之同聲因以㦄覽遺編研味前作挹其芳潤發於希慕更迭唱和互相切劘而予以固陋之姿叅詶繼之末入蘭㳺霧雖􅀗益以居多觀海學山嘆知量而中止旣恨其不至又犯乎不韙雖榮於託驥亦愧乎續貂間然於茲顔厚何已凡五七言律詩二百四十七章其屬而和者又十有五人析爲二卷取玉山䇿府之名命之曰西崑詶唱集云爾
  hash: sha256:f47aac6d5eac6b415c805f8c8a317f4bffea0ee0566dc8b79de997f3af4d8d2c
