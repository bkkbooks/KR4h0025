  text: 西崑詶唱集卷上
  hash: sha256:618a83f74f0a3a9b1c746399f226cd9f4896b7fbb60d16ecfd82cb2b9a7c067c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0025_SBCK_001-1a}
body:
  text: 受詔修書述懐感事三十韻楊億翰林學士左司諫知制誥太極垂裳日中原偃革初樓舩秋發詠衡右夜程書好問虚前席徴賢走傳車􅏃萊侔漢制煨燼訪秦餘紬繹資金匱規模岀玊除紛綸􅄏四部祕􅃉接千廬飫賜􅀟雞膳親􅅆六尺輿華芝下閶闔白羽擁儲胥望氣成龍虎披文辯魯魚清光無咫尺玄覧亦躊躇群彦揮鈆筆㣲生濫石渠嵇康真􅂴慢謝客本空踈講學情田埆談經腹笥虚月評依許劭文體慕相如雅飲歡娛洽清言鄙恡祛彌旬容岀沭終日喜群居撫已慚鳴玉歸田憶荷鋤池籠養魚鳥章服褁猿狙圜府愁尸祿天閽媿􅁦􅅂虚名同鄭􅒄散質􅀋荘樗國士誰知我隣家或侮予放懐齊指馬屏息度羲舒寡婦宜憂緯三公亦灌􅂼危心惟觳觫直道忍籧篨往聖容巢許先儒羙􅇞􅕋晨趍歎劳止夕惕念歸歟秦痔踈杯酒顔瓢頼斗儲如諧曲肱卧猶可直鈎漁矯矯􅀛銜印翩翩隼畵旟一麾終遂志阮籍去騎驢劉筠大理評事秘閣校理良弼論思暇英才視草餘西清承宻㫖東觀􅀋群書左氏先經日征􅀯發例初編年終顯徳歴帝自凡􅕋一覧無前古三長豈後予宏綱提要妙至論絶籧蒢訛繆刋三豕公乎喜衆狙菁英咸采掇痝贅盡銷除組織千章合研窮萬象虚胡爲參也魯亦造仲尼居䖏末加駢拇於中或輔車乗軒思衞鶴努力效劉驢見彈曽求炙臨川􅂧羡魚孰云貂可續自愧鶚難如早入希東郭先知服子輿直非頭似筆智謝里名樗蝸舎逰從寡鶉衣禮貌踈寸隂嗟荏苒十駕敢躊躇天祿楊雄閣承明嚴助廬時陪折爼宴頓異帶經鋤繋日親函丈他門絶曳􅅂卓錐然有地擔石尚無儲獵犬方勞指神􅀛可避漁屠門誇大嚼䑕壤鄙餘􅂼闕里辭難措漳濵病且祛學勤徒力爾性拙柰天歟大道今興起先生意卷舒正爲王者瑞何羡使君旟暗室欣觀火頺波頼决渠當仁如退譲末跡定淪胥􅀯朝億五鼔端門漏滴稀夜籖聲斷翠華飛繁星曉埭聞雞度細雨春場射雉歸歩試金蓮波濺襪歌翻玉􅀣涕沾衣龍􅐻王氣終三百猶得澄瀾對敞扉錢惟演太㒒少卿直秘閣結綺臨春映夕霏景陽鍾動曙星稀潘妃寳釧光如晝江令花牋落似飛舴艋凌波朱火度觚稜拂漢紫烟㣲自從飲馬秦淮水蜀桞無因對殿幃筠華林酒滿勸長星青漆樓高未稱情麝壁燈廻偏照晝雀航波漲欲浮城鍾聲但恐嚴粧晚衣帶郍知敵國輕千古風流佳麗地盡供哀思與蘭成李宗諤翰林學士仙華玉壽夜沉沉三閣齊雲􅂧道深平昔金鋪空廢􅁐于今瓊􅀣有遺音珠􅄕映􅆍方成夢麝壁飄香未稱心惆悵雷塘都㡬日吟魂醉魄巳相㝷禁中庭􅀣億直幹依金闥繁隂覆綺楹纍珠晨露重嘒管夜蟬清霜桂丹丘路星榆北斗城􅀊寒徒自許蜀桞􅀏􅀌貞惟演紫闥分隂地丹條擢秀時高枝接温􅀣宻葉覆辛夷夜影摇光接晨英玉露滋乗春好封殖爲賦角􅃓詩筠羽葉籠􅐻石虬枝拂畫堂夜聲含素瑟曉影逼扶桑好借鸞爲瑞無容麝損香寧知千載後秪羙召公棠休沭端居有懐希聖少卿學士億凝塵滿榻素琴横岸幘􅀌唫意未平茗粥露芽銷晝夢柘漿雲液浣朝酲水沉朱李金瓶澁風獵幽蘭羽扇輕獨憶當筵試湯餅謫仙氷骨照人清惟演雕盤瓊蕋氷去聲寒凘宻􅀣蟬嘶下直時更賦新詩答靈運不􅀅團扇隔元規經梅綠草沿堦上盡日流風轉蕙遅秪待觚稜照初旭横經還集綘紗幃筠䡾䡾風檐乳燕翔浴蘭衣綌簟流黄雲容倐變千峰險草色相㳂百帶長旋製紫荷供槖筆暗移神蔡忍搘􅇃思君秪欲傾家釀待警同誰賦栢梁陳越著作佐􅀰直史舘玉甃銀􅇃䕃碧桐北窓􅈿簟水紋融衣裁練布如王􅋚扇執蒲葵學謝公瓊屑半和仙掌露蘭苕輕泛楚䑓風若非氷雪神仙骨相樂誰同一􅀏中李維户部員外􅀰直集賢院銀闕琳房視草餘龍門岑寂斷軒車彩毫閒試金壺墨青案時㸔玉字書王儉風流希謝傅子雲詞賦敵相如瓊枝不見蕭齋晚蕙草烟㣲度綺䟽再次首唱韻和惟演雲變危峰萬里横簟鋪湘水一床平紅蘭受露消晨渇緑蕙翻風折夜酲逸少偶書葵扇貴羊欣閒卧練裙輕無妨天上芝泥熟獨㸔瑶光近太淸億碧􅀣銀塘接畫樓天人誰肯䧏瓊輈三山宻信傳青雀五日歸鞍躍紫騮郢酒泛氷星弁側呉歈倚瑟黛蛾愁雲峰得句懷真賞瘦盡東陽沈􅀮侯槿花筠紫霧函燈檠􅊮霞逼綺寮吳宫何薄命椘夢不終朝半􅀍曾羞問鄰墻􅁍悔招莫移風雨怨更囑鵲為橋億􅀫霧初披縠晨霞暫照梁千金􅀴換􅀏七駕未成章塵暗神妃襪衣殘侍史香深情傳寳瑟終古怨清湘劉隲工部貟外郎直集賢院􅉑國粧初罷高堂夢始廻霓裳猶未觧繡􅀍巳成堆赤帝宫􅄕卷華陽洞戸􅄏神仙有良㑹清唱在瑶臺惟演綺霞初結䖏珠露未稀時寳􅀣寧三尺華燈更九枝亭亭方自喜黯黯􅁍成悲欲作非烟散猶憐反照遲代意二首億夢蘭前事悔成占􅁍羡歸飛拂画簷錦瑟驚弦愁别鶴星機促杼怨新縑舞腰罷試􅀵紈䄂愽齒慵􅄏委玉奩㡬夕離魂自無􅄰椘天雲斷見􅋽蟾短夢殘粧􅃤别魂白頭詞苦怨文園誰容五馬傳心曲秪許􅀟鸞見淚痕易變肯隨南地橘忘􅁨虚對北堂萱回文信㫁衣香歇猶憶章䑓走畫轅宗諤霧鵉曉影忽叅差雲雨陽臺役夢思自是膠弦無續日不同珪月有圎時洞房斗帳承新愛河漢星橋隔後期綺榭凝塵斷消息杼情空擬四愁詩丁謂樞宻直學士玦帶􅃢瑚珮解瓊椘雲無定好傷情臨卭巳誤通琴意金谷難㝷辯玉聲㣲警單棲􅐻露重宻含幽思畹蘭平明珠百琲􅀅何當悵望􅁿軀病欲成刁衎駕部貟外郎直秘閣蕙時芳夕九囬陽歛􅃑東窓待曉光秦嶺􅀣高迷隴塞椘天雲澹隔瀟湘病餘公幹情多詠秋晚安仁鬂足霜休道鮫人落珠淚㣲波還擬託陳王筠華池阿閣不相容濁水清塵恨莫窮明月自新班女扇行雲無柰椘王風乳鶯啼曉銷蘭炷媚蝶傷春失蕙叢縦使多才如子建秪䏻援筆賦驚鴻元闕懊惱鴛鴦未白頭􅁍㝷遺翠失芳洲離魂暗逐明珠佩遠目偏傷紫桂樓湘水􅄅瀰歸別渚隴雲容與澹新秋菖花若有重開日得見菖花亦自羞隲路隔仙源不可㝷紫墻霜㦸夜沉沉緘情謾託傳書鴈换􅀏空餘取酒金翡翠巢成珠􅀣宻􅌐龍睡起玉淵湥新知自樂生離苦年少情多豈易禁漢武億蓬萊銀闕浪漫漫弱水囬風欲到難光照竹宫勞夜拜露溥金掌費朝飱力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安筠漢武天臺切綘河半􅆂非霧欝嵯峨桑田欲看他年變匏子先成此日歌夏􅂦㡬遷空象物秦橋未就巳沉波相如作賦徒䏻諷􅁍助飄飄逸氣多惟演一曲横汾鼓吹廻侍臣高㑹栢梁臺金芝燁煜凌晨見青雀軒翔白晝来立候東􅈚邀鶴駕窮兵西極待龍媒􅅴泉􅀕罷神光㓕更遣人間識玉杯衎高宴柏梁詞可仰横汾簫鼓樂難窮已教丞相開東閣猶使􅀅軍悞北戎洒淚甘泉還有恨祈年仙舘惜成空誰知辛苦囬中道共盡千齡五柞宫任隨太常丞直集賢院􅁄庭深恨隔仙曹桂舘蜚㢘事轉勞銀闕尚沉滄海闊井幹空拂綘河高萯陽戈獵侵多稼朔塞旌旗照不毛苦信憑虚王母􅀃東方三度􅀼蟠桃隲高挹方諸薦水倉醮壇時見燭神光日邉甲帳雖虚設汾上樓舩不可忘􅐻㮣碧霄甘露白􅂦遷幽壤瑞雲黃東廵岱嶽探金秉倒指寧聞壽數長宗諤建章宫闕欝岧嶤露掌脩茎倚泬寥平樂館中觀角觝單于臺上懾天驕蓬莱望氣滄波濶太一祈年紫府遥西毋不来東朔去茂陵松栢冷蕭蕭館中新蟬筠庭中嘉􅀣􅀤華滋可要螳蜋共此時翼薄乍舒宫女鬂蛻􅁿全解羽人尸風来玉女烏先轉露下金莖鶴未知日永聲長兼夜思肯容潘岳到秋悲億碧城青閣好追􅋽高桞新聲逐吹長貴伴金貂尊漢相淸含珠露怨齊王蘭䑓宻侍初成賦河朔􅂬逰正舉觴雲鬂翠緌徒自許先秋椘客已囬腸惟演冉冉光風泛紫蘭新聲含怨日􅀅殘自憐伴雀成􅇛扇誰許迎秋集武冠委脫亭􅆏隨木葉飛緌雲表拂仙􅐻青葱玉􅀣連金爵不覺醯雞競羽翰張詠樞宻直學士脫塵還與比仙逰露腹何妨近品流嫩殻半遺紅藥地細聲偏傍綠楊樓詩家取象吟難盡畫格偷真意不休正好儒林擬緌紼憑欄無苦預悲秋宗諤雨過新聲岀􅁐墻烟􅁿餘韻度囬塘短亭踈桞臨官道平野西風更夕陽八斗陳思饒賦詠二毛潘岳易悲凉感時偏動騷人思不問天涯與帝鄉騭摇落何湏宗玉悲齊庭遺恨莫沾衣池中􅔽蓞香全减井上梧桐葉乍飛風促筝聲隨斷續日移甎影自光輝宜秋門外饒芳􅀣結駟那堪送客歸夜讌錢惟濟恩州刺史清讌夜何其􅀯亭露欲晞蹁蹮霞神舞㶑灔羽觴飛鏤楶揺花落金璫照月輝瑶光未西落休賦􅋨言歸億􅋽宵綺宴開酃淥湛芳罍鶴盖留飛舄珠喉怨落梅薄雲齊鬂膩流雪椘腰廻巧􅀏傾城媚雕章刻燭催􅐻空珠有淚鑪冷蕙成􅁅巾角彈棋勝琴心促軫哀醉羅驚夢枕愁黛怯粧臺風細傳踈漏猶歌􅁸夜来筠玳押風􅄕薄金徒漏箭長食魚齊上客置醴漢元王蒟醬辛初和蓱韲冷乍嘗巢笙傳曲沃傪鼓􅀤漁陽吟燭惟憂盡杯籌豈易防齒犀融晏雪􅂁麝薦荀香􅀏逐呼盧勝歌隨解佩狂遺簮兼堕珥流眄􅂧囬膓綵鳯㝷仙史班騅待陸郎主歡殊未巳投轄在銀􅇃惟演昨夜讌􅀯堂華燈燭九光削青争落筆舉白闘飛觴秪覺輝裴玉寧思夢謝塘解煩多宻勺藉爼半蘭芳促席風弦怨開􅄕月露凉􅋳顔君莫訴西北轉銀潢鶴筠碧􅀣隂濃釦砌平華亭歸夢曉頻驚仙􅀴若未標竒相琴操何因􅀉恨聲養氣自憐鷄善勝全身􅁍許鴈䏻鳴芝田玉水春雲伴可淂乗軒是所榮億悵望青田碧草齊帝郷歸路阻丹梯露濃漢苑宵猶警雪滿梁園晝乍迷瑞世鸞皇徒自許繞枝烏鵲未成棲終年巳結雲羅恨忍送西樓曉月低詠共憐潔白本天姿縦在泥塵性不卑况是稻梁猒足日好㝷烟月􅁍歸時跡叅詩雅何年盡名系仙􅀴四海知應到崑丘指来㦄曽陪鴛鷺浴華池隨何年玉羽別崑丘飛舞長親十二樓警露夜窺瑶圃月翔雲高憶海天秋肯教渠畧知遐壽㑹向神區更遠逰正是溶溪烟水碧好陪青鳯飲澄流惟演碧􅀣隂濃接玉墀㡬年飛舞伴長離天淵風雨多秋意遼海烟波失舊期自許一鳴聞逈漢可隨三匝繞空枝從来腐䑕何曽頋不似鵷雛枉見疑公子夾道青樓拂綵霓月軒宫䄂案前溪錦鱗河伯供烹鯉金距隣翁逐闘鷄細雨墊巾過桞市􅁿風側㡌上銅堤􅃢瑚撃碎牛心􅀬香􅀥蘭芳客自迷筠油壁春車隔渭橋黃山路逺苦相邀行庖㸑蠟雕胡熟永埓鋪金汗血驕别舘横陳張静婉期門長揖霍嫖姚注鉤握槊曽無憚緑桂膏濃暁未銷惟演蓮勺交衢接荻園来時十里一開筵歌翻􅀯國桃桹曲馬過章䑓杏葉韉别殿對廻􅀟綬貴後門歸夜九枝然閒隨翠􅎻欹烏㡌紫陌三條入桞烟舊􅀅億平生苦戰憶山西拊劒臨風氣吐霓㦸戸當衢容駟馬髯奴繞帳列生犀新豐酒滿清啇咽武庫兵銷太白低髀肉漸生衣帶緩早朝空聽汝􅀯雞筠丈八蛇矛戰血乾子孫今巳列材官青烟碧瓦􅄏新第白草黄雲廢舊壇勞薄可甘先藺舌爵高還許戴劉冠秋来從獵長楊榭矍鑠猶能一據鞍隨㡬年鏖虜􅂧征蠻分閫功成両鬂班新畫儀形當漢閣舊銘勲業在燕山龍泉照歩文犀澁馬埒堆金駿足閒時泰無因問􅂶國曉窓風雪夢陽􅀜騭􅆠弩當年討不庭功成身退炳丹青囊沙澤畔知兵法聚米山前識陣形驥老未甘秋伏􅇫劍閑猶􅁴夜衝星分茅錫土傳家諜鍾􅂦還湏為勒銘宣曲二十二韻宣曲更衣寵高堂薦枕榮十洲銀闕峻三閣玉梯横鸞扇裁紈製羊車挿竹迎􅀯樓㸔馬舞北埭聽鷄鳴綵縷知延壽靈符為辟兵粟眉長占額蠇髪俯侵纓蓮的沉寒水芝房照畫楹麝臍薫翠􅀍鹿􅀲試銀筝秦鳯来何曉燕蘭夢未成絲嚢晨露濕椒壁夜寒􅁿綺叚餘霞散瑶林宻雪晴流風祕舞罷初日靚粧明雷響金車度梅殘玉管淸銀鐶添􅃇恨瓊􅀣怯新聲洛媛迷芝館星妃滯斗城七絲絙綠綺六箸闘明瓊慣聽端門漏愁聞上苑鶯虚廊偏響􅓏近署鎭嚴更剉蘖心長苦投籖夢自驚雲波誰託意璧月乆含情海闊桃難熟天高桂旋生銷魂璧臺路千古樂池平筠八月􅀵民算三千異典章天機從此淺國艶或非良玉户銅為沓羅幬􅁚作牀􅌐􅁎初悔泣飛燕近專房蓮小􅅻承歩梅新競試粧盡知春可樂終歎夜何長取酒臨卬遠吞聲息􅀦亡難銷守宫血易斷舞鵉腸百草兼花闘􅀟鈎映燭藏金人須手鑄虎圈更身當歩輦囬長樂飛除接未央琳珉飾漢館藻繡裛周墻猒火􅀟魚尾鳴弦小鴈行雲薨澄顥氣綺井􅈭回光路有斯湏隔􅁨難頃刻忘新聲来樂府别􅆍近温湯虹跨層臺晚螢飛下苑凉錦帷迎七夕蓬餌薦重陽九畹蘭承露三江橘帶霜方資裂繒􅀏可要蕩舟狂並釣池魚小重衾穴鳯􅃋􅃢瑚分碧􅀣火齊列淸防背枕多幽怨登樓更逺傷下陳無自媿人彘􅇵豺狼惟演絳縷初分後銀鐶未解時巳鄣紈扇􅀏猶捧玉壺悲乞巧長生殿迎風太液池雕屏􅉼火齊寳帳隔琉瑠欲買詞人賦空傳狎客詩蔗漿銷内􅀬瓊蕋療朝飢綺蔕桃初熟紅心草欲披凌波渡羅襪向日翳華芝素臉分丹柰香津滴紫梨龍梭隨振素􅆩髓􅀘凝脂蓬餌重陽節金針七夕期玉膏嘗滵溢翠蓋逐威㽔弦急哀隨指歌長恨入眉青鸞惟有舞赤鳯可䏻疑下蔡迷還易平陽破未知髻高􅁫自墜腰細佩長垂出恐嚴鍾晚歸嫌鈿幰遲轆轤驚晚夢鸚鵡漏春思䰟怨惟愁斷腸柔巳自危壁璫螢影度瓊戸蘚花滋掩鼻讒難訴披圗悔豈追秪應金帶枕􅂓為逹㣲辭赤日億赤日亭亭晝正賖長風萬里憶星槎銅􅐻瓊蕋三危露素綆寒􅄴五色瓜蘭室冷光浮玉簟桞營清吹逐金笳翠㣲泉石終􅀯路千古離宫􅀝曙霞筠芒熛盛徳正渾儀休問探湯向小兒盡日羽陵開蠧簡㡬人河朔引芳巵堯厨萐莆頻摇處漢殿桐風未轉時争得琴高借􅀟鯉暫逰姑射對氷姿夜意惟演漏淺風㣲夜未勝雨雲無跡火雲凝簟鋪寒水頻移枕帳卷輕烟更背燈沃頂㡬思金掌露滌煩誰借玉壺氷蘭䑓知有披􅁭䖏宋玉多才獨自登明皇億玉牒開􅀚檢未封闘鷄三百逺相􅀙紫雲度曲傳浮世白石標年鑿半峰河朔叛臣驚舞馬渭橋遺老識真龍蓬山鈿合愁通信廽首風濤一萬重惟演山上湯泉架玉梁雲中􅃨道拂瑶光絲囊暗結三危露翠幰時遺百和香枉是金鷄親便坐更抛珠􅀍掩方牀匆匆一曲凉州罷萬里橋邉見夕陽筠􅀊􅀊􅀯山見壽星百蠻廻首奉威靈梨園法部兼胡部玉輦長亭􅂧短亭河鼓暗期隨日轉馬嵬恨血染塵腥西歸重按凌波舞故老相㸔但涕零別墅億別墅過􅀙數當年意氣豪象筵開旭日金絡騁平皐託乗争飛蓋銜杯更藉糟麝煙凝藻梲繪縷落霜刀鷄􅋍花冠闘猨驚柘彈􅃅光風㣲轉蕙露井正􅄏桃武子牛探灸梁家兎刻毛東城歸路晚飛絮撲雲􅂁筠感槩􅂧風流交通徧五侯鳴鍾平樂宴撃鞠茂陵㳺狡兎方多穴蒼鷹始下韝鈴奴藏廣桞劒􅀐騁長揪雲際㝷撞技花間􅀏躄樓害先除白額夢巳應黄頭燕酒惟増氣秦筝漫送愁鴻毛輕一死祇待報私讎惟演别館斗城傍斜軒映曲房蒼頭冠綠幘中婦織流黄􅃨道登平樂期門集未央意錢梁冀宅挾瑟莫愁堂走馬章䑓桞停車陌上桑彀􅃓隨寳障投轄付銀牀出戴䌓星急歸衝細雨忙曽過阿君􅀫醉舞起跳梁無題三首億曲池波煖蕙風􅁿頭白鴛鴦占綠萍􅅻斷歌雲成夢雨斗廻􅀏電作嗔霆湘蘭自古傳幽怨秦鳯何年入杳􅄀不待萱蘇蠲薄怒閒堦闘雀有遺翎合歡蠲忿亦休論夢蝶翩翩逐怨䰟秪待傾城終未􅀏不曽忘國自無言風翩林葉迷歸燕露裊池荷觸戯鴛湘水東流何日竭烟篁千古見啼㾗滿天飛絮罥㳺絲釦砌苔錢晦履綦北渚自應流怨淚東隣誰敢效顰眉嫦娥桂獨成幽恨素女弦多有剰悲㡬夕空機愁促織銀河休問報章遲惟演誤語成疑意巳傷春山低歛翠眉長鄂君繡􅀍朝猶掩筍令薫爐冷自香有恨豈因燕鳯去無言寧爲息侯亡合歡不驗丁香結秪得凄凉對燭房耿耿寒燈照醉羅㸔朱成碧意如何虎頭辟惡無妨枕犀角凉心更待磨惟有幽蘭啼月露可􅀅尺素託雲波山屏六曲歸来夜秪恐重投折齒梭香歇環沉無限猜春隂濃淡晝􅄕􅄏有時􅐻馬㸔猶􅂴盡日投壷􅀏未廽蝶怨豈能重傅粉雉嬌疑待更求媒啼粧不治金翹闇腸斷温郎玉照臺筠走馬章䑓冐雨歸後門猶嘆滯前期荷心岀水終無定蘿蔓􅀙風莫自持􅃨帳麝􅁿難辟惡曲房蠶􅂴不成絲漸漸壠麥藏鳴雉更恨如臯一箭遲􅄕聲竹影浪多疑仙􅂖何能爲解迷藻井風高蛛壊網杏梁春晚燕争泥更㸔山逺惟凝黛縦許犀靈秪駭雞枉裂霜繒㡬千尺紅蘭終夕露珠啼麝烈初難和烏驚毎易傷蕩舟殊不禁奔月可能防洛浦多遺翠秦樓滯采桑飛蛾攅釦燭綠鴨闘銀塘夜合花含霧冝男草帶霜琅玕餘舊貫湏要鳯求皇荷花筠水國開良宴霞天湛晚暉凌波宓妃至盪􅄴莫愁歸粧淺休啼臉香清願襲衣即時聞皷瑟他日問支機繡騎翩翩過珍禽両両飛牢收交甫佩莫遣比心違億絶岸踈烟合回塘夕照和水仙猶度曲川后自􅀵波銀漢橋横鵲蘅臯襪濺羅玉杯承露重鈿扇起風多翠羽芳洲近青絲快􅀐過石城秋信斷搔首柰愁何惟演水闊雨蕭蕭風㣲影自揺徐娘羞半靣椘女妬纎腰别恨抛深浦遺香逐画撓華燈蓮霧夕鈿合映霞朝淚有鮫人見䰟湏宋玉招凌波終未渡疑待鵲為橋謂相􅀝秋風立蘭言似有無未饒霜女俊不愛月娥􅀌力弱烟􅀍素心危露泣珠剪裁隨椘思幽怨􅀉吳覦半坼香囊解㣲傾醉弁扶渉江如可採百琲答輕驅再賦筠莫雨過湘渚㣲凉滿椘宫濺裙無限水障􅃑㡬多風浪跡嫌萍實塵勞􅀏菊叢氣清防麝損信宻待魚通㳺女歌争􅀤騷人思未窮休傳江北意月冷魏池空億舒女清泉滿黄姑別渚通巴天迷峽雨楚澤映江楓思逐鮫絲亂香愁翠􅀍空洒從瓊蕋露吹任石􅀹風怨淚連踈竹􅀻書託過鴻􅀟魚應共戯休問葉西東惟演玉甃引清泉風高露白天盈盈臨一水􅇈羃隔長烟巳分蘭芝溺仍憂趙后仙鮫絲衣更宻珠􅑕淚長圎瑟怨来湘浦鴻驚近洛川金塘正斜照誰􅀝木蘭船謂彼羙秋江上塵埃耻託根􅀏傾行雨國香返夢蘭䰟蛺蝶無媒妁鴛鴦見子孫徧窺思兩槳深鏁憶重門怯徇風波性慚留月露痕枉􅀅金試歩千古怨東昏再賦七言筠紉蘭為佩桂為舟北渚雲飛􅀤櫂謳已有萬􅁝能結怨不湏千蓋強障羞金隄㪍􅌥誰同上翠帟繽紛客自留欲選浣紗傾敵國越王更起近江樓億翠幄飄香映綺􅃭鈿􅐻清曉露成珠休啼為近鮫人室欲􅀏誰投玉女壺雲氣乍廽巫峽夢水嬉猶記曲池圖金花􅁍薦何人歩枉遣凌波襪縷濡惟演欲網􅃢瑚碧浪深横塘斜日帶秋隂漢宫此地留金餅洛浦何人遺錦衾舞學西城廻雅態歌傳􅀯國有餘音韓憑恨魄如長在青骨香銷亦見㝷又贈一絶筠粉白朱紅翡翠翹漢宫等級不相饒風波若未乖前約一死何辭更抱橋億瑶水霓旌綺宴陳漢宫渠怨露華新誰然百炬金花燭渡襪歌梁暗落塵惟演唾露金銷月似霜雲屏玊簟剰清光不知誰有高唐夢翠􅀍華燈徹曙香謂夢散高唐夜正遥椘天何處不無憀秋風似㑹荆王意露渚煙汀養細腰梨惟演紫花青蔕壓枝繁秋實離離岀上蘭東海圎珪無柰碧嵰州甜雪不勝寒巳憂仙佩懸珠重更恐金刀切玉難自與相如解痟渴何湏瓊蕋作朝飱億繁花如雪早傷春千􅀣封侯未是貧漢苑漫傳盧橘賦驪山誰識荔枝塵九秋青女霜添味五夜方諸月溜津椘客狂酲朝已解水風猶自獵汀蘋筠玄光仙􅀣阻丹梯御􅀫嘉名近可齊真定早寒霜葉薄樊川初暁露枝低先時櫻熟煩羊酩逺信梅酸損瓠犀宋玉有情終未識蔗漿無柰椘魂迷謂摇摇繁實弄秋光曽伴青椑薦武皇玄圃雲腴滋紺質上林風馭獵清香㝷芳尚憶瓊為􅀣蠲渴因知玉有漿多少好枝誰最見冐霜丹頰倚隣墻淚二首億錦字梭停掩夜機白頭吟苦怨新知誰聞壠水囬腸後更聽巴猨拭􅃑時漢殿㣲凉金屋閉魏宫清暁玉壺欹多情不待悲秋氣秪是傷春鬂巳􅁝寒風易水巳成悲亡國何人見􅁰離枉是荆王疑羙惟演紫天銀水渡辛夷藻帳雕屏觧佩時金朔窓中窺阿母小姑堂上憶蘭芝初宵巳有穿針樂欲曙還成弄杼悲若比人間更賜斷萬重雲浪􅀉㣲辭成都億五丁力盡蜀川通千古成都綠酎醲白帝倉空蛙在井青天路險劍爲峰漫傳西漢祠神馬巳見􅀯陽起卧龍張載勒銘堪作戒莫矜凾谷一丸封筠鏤膚剽俗恣逰遨可得蹲鴟號富饒井絡共知天與險􅁞叢無柰世興妖杜䳌積恨花如血諸􅁑遺靈柏半燒才似文園何足道一生琴意秪成痟惟演武侯千載有遺靈􅐻石刀痕尚未平巴婦自饒丹穴富漢庭還責碧砮征雨􅀴蜀市應和酒琴到臨卭别􅀉情知有忠臣能叱馭不論雲棧更峥嶸秋夜對月億􅀌雲飛隴首顥氣滿啇中警鶴仙􅐻外圎蟾浴殿東浦寒珠有淚巖逈桂生風星彩沉榆莢霜華襲桂叢光摇銀燭亂影射王壺空露館迷秦甸冰䑓接魏宫繞枝驚暗鵲促杼思隂􅆉更想離居恨囬腸㡬處同筠瑶席留􅌚友金波對廣庭重􅄕和霧卷六幕極天青屬玉東西館琉璃左右屏梁園休賦雪隋􅁐漫飛螢璞更令楊子怨多岐胡笳暮應三撾鼓椘舞春臨百子池未扺索居愁翠􅀍圎荷清曉露淋漓惟演鮫􅐻千􅀧怨吞聲蠟炬風高翠箔輕夜半啇陵聞别鶴酒䦨安石對哀筝銀屏欲去連珠迸金屋初来玉筯横馬上悲歌􅀉黄鵠紫䑓廻首莫雲平家在河陽路入秦樓頭相望秪酸辛江􅀯滿目新亭宴旗鼓傷心故國春仙掌􅀝天頻滴露方諸待月自􅆂津荆王未辨連城價腸斷􅀯州抱壁人筠雍門琴罷巳浪浪更上牛山半夕陽椘澤雲迷千里目薊門歌斷九廻腸寒梅帶雨飄離席尺素停燈作報章湘水未乾終未盡豈徒萬􅀧􅀉踈篁含酸茹歎㡬傷神鳴咽交流忽滿巾建業江山非故􅀦㶚陵風雨又殘春虞歌决别知亾椘宴酒初酣待報秦欲訴青天銷積恨月娥孀獨更愁人七夕億清淺銀河􅊕靄􅀵漢宫還起曝衣樓共瞻月􅀣憐飛鵲誰泛星槎見飲牛弄杼暫應停素手穿針空待貺明眸匆匆一夕填橋苦不似人間有造舟筠靈匹迢迢駕七襄暫陳雲幄對星潢巳㸔素魄過三讓何用華燈更九光玉腕􅀟絲􅁿宛轉霞衣雜佩暗丁當誰言巧意䏻勝拙秪見鳩閑鵲自忙蟾滴全供硯牛津不見星綺窓分皎皎苔閣共亭亭已䘮應劉魄誰通鮑謝靈欲銷千里恨魯酒薄還醒惟演顥氣中秋正明河左界長桂􅀌香易散􅑕冷淚先汪飛蓋傾蘭坂鳴琴厭燭房玉􅐻浮浩露素鯁冰寒漿浪白江連椘風凄笛怨羗􅁃樓􅂓頋慕潘省更悲凉雪漫誇圎璧珠休號夜光嫦娥悔孀獨空見海生桑前檻十二韻億前檻瓊鈎桂深房斗帳褰梨花飛白雪蕙草吐青煙彩鳳依珠􅀣神龍護玉蓮驚禽時格磔戯蝶自翩翾度繡金針澁迷鈎晝蠟煎怨眉顰翠羽危涕迸朱弦逺信三年字空庭尺五天行雲愁夢徹初日妬粧妍織為囬文亂鬟非墮馬偏風車来未定月杵望長懸寳鑑腸空斷銀潢眼􅁒穿曽波自東注㣲意若爲傳筠垂桞隂岑院㳺絲曠蕩春蘅臯誰駐馬羅襪自生塵四姓良家子三年賦客隣拆腰行太緩連􅃈語何頻倭墮雲争媚便姢月闘新㓕瘢難辨玉約指不勝銀電􅀏投壺勝江澄擣練勻東􅀯勞鶴望西北限牛津寳唾凝蘭氣鳴黄咽綘脣籠禽思隴􅀣洞犬謝秦人詠絮才無對聞琴意始真長安足輕薄慎勿走瓊輪小園秋夕惟演潘鬂秋来巳自傷􅁃園時物更荒凉紫梨半熟連紅􅀣碧蘚初圎亂縹牆月露暗從􅀌桂滴水風猶獵敗荷香滑稽還喜鴟夷在欲取臨邛羙酒嘗億鴻都歸晚直城賖墻外連營咽莫笳玉井梧傾猶待鳯金塘柳宻更藏鴉心揺雲闕傳踈漏目斷星津過逈槎巳是秋来移帶眼可堪玄􅁂有霜華筠枳落莎渠急夜蟲翛然平子四愁中栗林忽感雕陵􅍎雲表初過代嶺鴻阮籍卧帷踈鑒月馬融横笛逺含風􅀰潜吏隠前賢事猶勝楊岐泣斷蓬始皇億衡石量書夜漏深咸陽宫闕杳沉沉滄波沃日虚鞭石白刄凝霜枉鑄金萬里長城穿地􅎃八方馳道聽車音儒坈未冷􅌐山火三月青烟繞翠岑筠利觜由来得擅場盡遷豪富入咸陽屬車夜出迷雲雨峻令朝行􅇵虎狼前殿建旗凌紫極東門立石見扶桑從臣嘉頌徒虚羙不柰盧生䜟國亡惟演天極周環百二都六王鍾鐻接劉蘇金椎漫築甘泉道匕首還隨督亢圗巳覺副車驚愽浪更携連弩望蓬壺不􅀅寸土封諸子劉項由来是匹夫初秋屬疾筠秋隂凄淡隔重城一畆居仍近禁營漢苑樓䑓沉莫影謝家鼓吹􅀤新聲烟昏露井殘桃墜葉下凉波獨鳥驚莭物變衰吟更苦可堪漳浦卧劉禎億潘􅀰巳是入秋悲屬疾猶貪桂浦羸宻雪才高閒賦筆流波意逺託琴絲離愁盡日吟靑案蠲渇何人􅀉紫梨昨夜西樓凉月滿淸談偏憶􅁃元規惟演􅁡房初滿石榴紅秋意先侵玉井桐薤簟自憑􅀯郭几􅂖巾猶卧北窓風雲迷候鴈辭遥塞露濕飛螢􅁸暗藂病巳不湏傳七􅀤粉牋香墨􅀉詩筒西崑詶唱集卷上
