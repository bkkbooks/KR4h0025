露吹任石尤風怨淚連踈竹私書託過鴻雙魚應共戲休問葉西東惟演玉甃引清泉風高露白天盈盈臨一水羃羃隔長煙巳分蘭芝溺仍憂趙后仙鮫絲衣更密珠􅑕淚長圎瑟怨來湘浦鴻驚近洛川金塘正斜照誰倚木蘭船謂彼美秋江上塵埃耻託根笑傾行雨國香返夢蘭魂蛺蝶無媒妁鴛鴦見子孫遍窺思兩槳深鎖憶重門怯徇風波性慚留月露痕枉將金試步千古怨東昏再賦七言筠紉蘭為佩桂為舟北渚雲飛發棹謳已有萬絲能結怨不須千蓋強障羞金隄勃窣誰同上翠帟繽紛客自留欲選浣紗傾敵國越王更起近江樓億翠幄飄香映綺𥜗鈿􅐻清曉露成珠休啼為近鮫人室欲笑誰投玉女壺雲氣乍廽巫峽夢水嬉猶記曲池圖金花却薦何人步枉遣凌波襪縷濡惟演欲網珊瑚碧浪深橫塘斜日帶秋隂漢宫此地留金餅洛浦何人遺錦衾舞學西城回雅態歌傳南國有餘音韓憑恨魄如長在青骨香銷亦見尋又贈一絶筠粉白朱紅翡翠翹漢宫等級不相饒風波若未乖前約一死何辭更抱橋億瑶水霓旌綺宴陳漢宫渠怨露華新誰然百炬金花燭渡襪歌梁暗落塵惟演唾露金銷月似霜雲屏玊簟剩清光不知誰有高唐夢翠𬒳華燈徹曙香謂夢散高唐夜正遙椘天何處不無憀秋風似會荆王意露渚煙汀養細腰梨惟演紫花青蒂壓枝繁秋實離離出上蘭東海圎圭無奈碧嵰州甜雪不勝寒巳憂仙佩懸珠重更恐金刀切玉難自與相如解痟渴何須瓊蕊作朝飱億繁花如雪早傷春千樹封侯未是貧漢苑漫傳盧橘賦驪山誰識荔枝塵九秋青女霜添味五夜方諸月溜津椘客狂酲朝已解水風猶自獵汀蘋筠玄光仙樹阻丹梯御宿嘉名近可齊真定早寒霜葉薄樊川初曉露枝低先時櫻熟煩羊酩逺信梅酸損瓠犀宋玉有情終未識蔗漿無奈椘魂迷謂搖搖繁實弄秋光曽伴青椑薦武皇玄圃雲腴滋紺質上林風馭獵清香尋芳尚憶瓊為樹蠲渴因知玉有漿多少好枝誰最見冒霜丹頰倚鄰墻淚二首億錦字梭停掩夜機白頭吟苦怨新知誰聞壠水回腸後更聽巴猿拭𬒮時漢殿微涼金屋閉魏宫清曉玉壺欹多情不待悲秋氣秪是傷春鬢巳絲寒風易水巳成悲亡國何人見黍離枉是荆王疑美惟演紫天銀水渡辛夷藻帳雕屏解佩時金朔窗中窺阿母小姑堂上憶蘭芝初宵巳有穿針樂欲曙還成弄杼悲若比人間更賜斷萬重雲浪寄微辭成都億五丁力盡蜀川通千古成都緑酎醲白帝倉空蛙在井青天路險劍為峰漫傳西漢祠神馬巳見南陽起卧龍張載勒銘堪作戒莫矜函谷一丸封筠鏤膚剽俗恣逰遨可得蹲鴟號富饒井絡共知天與險𧖟叢無奈世興妖杜鵑積恨花如血諸葛遺靈柏半燒才似文園何足道一生琴意秪成痟惟演武侯千載有遺靈􅐻石刀痕尚未平巴婦自饒丹穴富漢庭還責碧砮征雨經蜀市應和酒琴到臨卭别寄情知有忠臣能叱馭不論雲棧更峥嶸秋夜對月億孤雲飛隴首皓氣滿啇中警鶴仙􅐻外圎蟾浴殿東浦寒珠有淚巖逈桂生風星彩沉榆莢霜華襲桂叢光搖銀燭亂影射王壺空露館迷秦甸冰臺接魏宫繞枝驚暗鵲促杼思隂蟲更想離居恨回腸幾處同筠瑶席留􅌚友金波對廣庭重簾和霧卷六幕極天青屬玉東西館琉璃左右屏梁園休賦雪隋苑漫飛螢璞更令楊子怨多岐胡笳暮應三撾鼓椘舞春臨百子池未扺索居愁翠𬒳圎荷清曉露淋漓惟演鮫􅐻千點怨吞聲蠟炬風高翠箔輕夜半啇陵聞别鶴酒闌安石對哀筝銀屏欲去連珠迸金屋初來玉筯橫馬上悲歌寄黃鵠紫臺回首莫雲平家在河陽路入秦樓頭相望秪酸辛江南滿目新亭宴旗鼓傷心故國春仙掌倚天頻滴露方諸待月自涵津荆王未辨連城價腸斷南州抱壁人筠雍門琴罷巳浪浪更上牛山半夕陽椘澤雲迷千里目薊門歌斷九回腸寒梅帶雨飄離席尺素停燈作報章湘水未乾終未盡豈徒萬點寄踈篁含酸茹歎幾傷神鳴咽交流忽滿巾建業江山非故國灞陵風雨又殘春虞歌決别知亡椘宴酒初酣待報秦欲訴青天銷積恨月娥孀獨更愁人七夕億清淺銀河暝靄收漢宫還起曝衣樓共瞻月樹憐飛鵲誰泛星槎見飲牛弄杼暫應停素手穿針空待貺明眸匆匆一夕填橋苦不似人間有造舟筠靈匹迢迢駕七襄暫陳雲幄對星潢巳看素魄過三讓何用華燈更九光玉腕雙絲輕宛轉霞衣雜佩暗丁當誰言巧意能勝拙秪見鳩間鵲自忙蟾滴全供硯牛津不見星綺窗分皎皎苔閣共亭亭已喪應劉魄誰通鮑謝靈欲銷千里恨魯酒薄還醒惟演皓氣中秋正明河左界長桂孤香易散􅑕冷淚先汪飛蓋傾蘭坂鳴琴厭燭房玉􅐻浮浩露素鯁冰寒漿浪白江連椘風凄笛怨羌庾樓聊顧慕潘省更悲涼雪漫誇圎璧珠休號夜光嫦娥悔孀獨空見海生桑前檻十二韻億前檻瓊鈎桂深房斗帳褰梨花飛白雪蕙草吐青煙彩鳳依珠樹神龍護玉蓮驚禽時格磔戲蝶自翩翾度繡金針澀迷鈎晝蠟煎怨眉顰翠羽危涕迸朱弦逺信三年字空庭尺五天行雲愁夢徹初日妬粧妍織為回文亂鬟非墮馬偏風車來未定月杵望長懸寶鑑腸空斷銀潢眼𣣔穿曽波自東注微意若為傳筠垂桞隂岑院遊絲曠蕩春蘅臯誰駐馬羅襪自生塵四姓良家子三年賦客鄰拆腰行太緩連瑣語何頻倭墮雲爭媚便姢月鬪新滅瘢難辨玉約指不勝銀電笑投壺勝江澄搗練勻東南勞鶴望西北限牛津寶唾凝蘭氣鳴黃咽綘脣籠禽思隴樹洞犬謝秦人詠絮才無對聞琴意始真長安足輕薄慎勿走瓊輪小園秋夕惟演潘鬢秋來巳自傷庾園時物更荒涼紫梨半熟連紅樹碧蘚初圎亂縹牆月露暗從孤桂滴水風猶獵敗荷香滑稽還喜鴟夷在欲取臨邛美酒嘗億鴻都歸晚直城賖墻外連營咽莫笳玉井梧傾猶待鳯金塘柳密更藏鴉心搖雲闕傳踈漏目斷星津過逈槎巳是秋來移帶眼可堪玄鬢有霜華筠枳落莎渠急夜蟲翛然平子四愁中栗林忽感雕陵鵲雲表初過代嶺鴻阮籍卧帷踈鑒月馬融橫笛逺含風郎潛吏隱前賢事猶勝楊岐泣斷蓬始皇億衡石量書夜漏深咸陽宫闕杳沉沉滄波沃日虛鞭石白刃凝霜枉鑄金萬里長城穿地􅎃八方馳道聽車音儒坈未冷􅌐山火三月青煙繞翠岑筠利觜由來得擅場盡遷豪富入咸陽屬車夜出迷雲雨峻令朝行劇虎狼前殿建旗凌紫極東門立石見扶桑從臣嘉頌徒虛美不奈盧生讖國亡惟演天極周環百二都六王鍾鐻接劉蘇金椎漫築甘泉道匕首還隨督亢圗巳覺副車驚博浪更携連弩望蓬壺不將寸土封諸子劉項由來是匹夫初秋屬疾筠秋隂凄淡隔重城一畝居仍近禁營漢苑樓臺沉莫影謝家鼓吹發新聲煙昏露井殘桃墜葉下涼波獨鳥驚莭物變衰吟更苦可堪漳浦卧劉禎億潘郎巳是入秋悲屬疾猶貪桂浦羸密雪才高間賦筆流波意逺託琴絲離愁盡日吟靑案蠲渴何人寄紫梨昨夜西樓涼月滿淸談偏憶庾元規惟演蜜房初滿石榴紅秋意先侵玉井桐薤簟自憑南郭几穀巾猶卧北窗風雲迷候鴈辭遙塞露濕飛螢起暗藂病巳不須傳七發粉箋香墨寄詩筒西崑酬唱集卷上
