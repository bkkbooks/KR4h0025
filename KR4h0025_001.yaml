front:
  text: 西崑酬唱集卷上
  hash: sha256:b2f33bbc6e715cd911d4414835df40cfbd32fcd08d41770dd45a3286cd97a3ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0025_SBCK_001-1a}
body:
  text: 受詔修書述懷感事三十韻楊億翰林學士左司諫知制誥太極垂裳日中原偃革初樓船秋發詠衡右夜程書好問虛前席徴賢走傳車􅏃萊侔漢制煨燼訪秦餘紬繹資金匱規模出玊除紛綸開四部祕邃接千廬飫賜雙雞膳親回六尺輿華芝下閶闔白羽擁儲胥望氣成龍虎披文辨魯魚清光無咫尺玄覽亦躊躇群彥揮鉛筆微生濫石渠嵇康真懶慢謝客本空踈講學情田埆談經腹笥虛月評依許劭文體慕相如雅飲歡娛洽清言鄙吝祛彌旬容出沭終日喜群居撫已慚鳴玉歸田憶荷鋤池籠養魚鳥章服褁猿狙圜府愁尸祿天閽愧弊𥚑虛名同鄭璞散質類莊樗國士誰知我鄰家或侮豫放懷齊指馬屏息度羲舒寡婦宜憂緯三公亦灌𬞞危心惟觳觫直道忍籧篨往聖容巢許先儒美寧􅕋晨趍歎勞止夕惕念歸歟秦痔踈杯酒顔瓢賴斗儲如諧曲肱卧猶可直鈎漁矯矯龜銜印翩翩隼畫旟一麾終遂志阮籍去騎驢劉筠大理評事祕閣校理良弼論思暇英才視草餘西清承密旨東觀類群書左氏先經日征南發例初編年終顯德歷帝自凡􅕋一覽無前古三長豈後豫宏綱提要妙至論絶籧蒢訛繆刋三豕公乎喜衆狙菁英咸采掇痝贅盡銷除組織千章合研窮萬象虛胡為參也魯亦造仲尼居處末加駢拇於中或輔車乘軒思衛鶴努力效劉驢見彈曽求炙臨川𣸪羡魚孰云貂可續自愧鶚難如早入希東郭先知服子輿直非頭似筆智謝里名樗蝸舍逰從寡鶉衣禮貌踈寸隂嗟荏苒十駕敢躊躇天祿楊雄閣承明嚴助廬時陪折爼宴頓異帶經鋤繫日親函丈他門絶曳𥚑卓錐然有地擔石尚無儲獵犬方勞指神龜可避漁屠門誇大嚼鼠壤鄙餘𬞞闕里辭難措漳濵病且祛學勤徒力爾性拙奈天歟大道今興起先生意卷舒正為王者瑞何羡使君旟暗室欣觀火頺波賴決渠當仁如退讓末迹定淪胥南朝億五鼓端門漏滴稀夜籖聲斷翠華飛繁星曉埭聞雞度細雨春場射雉歸步試金蓮波濺襪歌翻玉樹涕沾衣龍􅐻王氣終三百猶得澄瀾對敞扉錢惟演太㒒少卿直祕閣結綺臨春映夕霏景陽鍾動曙星稀潘妃寶釧光如晝江令花箋落似飛舴艋凌波朱火度觚稜拂漢紫煙微自從飲馬秦淮水蜀桞無因對殿幃筠華林酒滿勸長星青漆樓高未稱情麝壁燈回偏照晝雀航波漲欲浮城鍾聲但恐嚴粧晚衣帶郍知敵國輕千古風流佳麗地盡供哀思與蘭成李宗諤翰林學士仙華玉壽夜沉沉三閣齊雲𣸪道深平昔金鋪空廢苑于今瓊樹有遺音珠簾映寢方成夢麝壁飄香未稱心惆悵雷塘都幾日吟魂醉魄巳相尋禁中庭樹億直幹依金闥繁隂覆綺楹纍珠晨露重嘒管夜蟬清霜桂丹丘路星榆北斗城歲寒徒自許蜀桞笑孤貞惟演紫闥分隂地丹條擢秀時高枝接溫樹密葉覆辛夷夜影搖光接晨英玉露滋乘春好封殖為賦角弓詩筠羽葉籠􅐻石虬枝拂畫堂夜聲含素瑟曉影逼扶桑好借鸞為瑞無容麝損香寧知千載後秪美召公棠休沭端居有懷希聖少卿學士億凝塵滿榻素琴橫岸幘孤吟意未平茗粥露芽銷晝夢柘漿雲液浣朝酲水沉朱李金瓶澀風獵幽蘭羽扇輕獨憶當筵試湯餅謫仙氷骨照人清惟演雕盤瓊蕊氷去聲寒澌密樹蟬嘶下直時更賦新詩答靈運不將團扇隔元規經梅緑草沿階上盡日流風轉蕙遲秪待觚稜照初旭橫經還集綘紗幃筠䡾䡾風簷乳燕翔浴蘭衣綌簟流黃雲容倐變千峰險草色相沿百帶長旋製紫荷供槖筆暗移神蔡忍搘牀思君秪欲傾家釀待警同誰賦柏梁陳越著作佐郎直史館玉甃銀牀蔭碧桐北窗珍簟水紋融衣裁練布如王導扇執蒲葵學謝公瓊屑半和仙掌露蘭苕輕泛楚臺風若非氷雪神仙骨相樂誰同一笑中李維户部員外郎直集賢院銀闕琳房視草餘龍門岑寂斷軒車彩毫間試金壺墨青案時看玉字書王儉風流希謝傅子雲詞賦敵相如瓊枝不見蕭齋晚蕙草煙微度綺疏再次首唱韻和惟演雲變危峰萬里橫簟鋪湘水一床平紅蘭受露消晨渴緑蕙翻風折夜酲逸少偶書葵扇貴羊欣間卧練裙輕無妨天上芝泥熟獨看瑶光近太淸億碧樹銀塘接畫樓天人誰肯降瓊輈三山密信傳青雀五日歸鞍躍紫騮郢酒泛氷星辨側吳歈倚瑟黛蛾愁雲峰得句懷真賞瘦盡東陽沈隱侯槿花筠紫霧函燈檠􅊮霞逼綺寮吳宫何薄命椘夢不終朝半𬒳曾羞問鄰墻却悔招莫移風雨怨更囑鵲為橋億宿霧初披縠晨霞暫照梁千金經換笑七駕未成章塵暗神妃襪衣殘侍史香深情傳寶瑟終古怨清湘劉隲工部貟外郎直集賢院􅉑國粧初罷高堂夢始回霓裳猶未解繡𬒳巳成堆赤帝宫簾卷華陽洞戶開神仙有良會清唱在瑶臺惟演綺霞初結處珠露未稀時寶樹寧三尺華燈更九枝亭亭方自喜黯黯却成悲欲作非煙散猶憐反照遲代意二首億夢蘭前事悔成占却羡歸飛拂畫簷錦瑟驚弦愁别鶴星機促杼怨新縑舞腰罷試收紈袖博齒慵開委玉奩幾夕離魂自無寐椘天雲斷見􅋽蟾短夢殘粧慘别魂白頭詞苦怨文園誰容五馬傳心曲秪許雙鸞見淚痕易變肯隨南地橘忘憂虛對北堂萱回文信斷衣香歇猶憶章臺走畫轅宗諤霧鵉曉影忽參差雲雨陽臺役夢思自是膠弦無續日不同圭月有圎時洞房斗帳承新愛河漢星橋隔後期綺榭凝塵斷消息杼情空擬四愁詩丁謂樞密直學士玦帶珊瑚珮解瓊椘雲無定好傷情臨卭巳誤通琴意金谷難尋辨玉聲微警單棲􅐻露重密含幽思畹蘭平明珠百琲將何當悵望輕軀病欲成刁衎駕部貟外郎直祕閣蕙時芳夕九回陽斂𬒮東窗待曉光秦嶺樹高迷隴塞椘天雲淡隔瀟湘病餘公幹情多詠秋晚安仁鬢足霜休道鮫人落珠淚微波還擬託陳王筠華池阿閣不相容濁水清塵恨莫窮明月自新班女扇行雲無奈椘王風乳鶯啼曉銷蘭炷媚蝶傷春失蕙叢縱使多才如子建秪能援筆賦驚鴻元闕懊惱鴛鴦未白頭却尋遺翠失芳洲離魂暗逐明珠佩遠目偏傷紫桂樓湘水渺瀰歸別渚隴雲容與淡新秋菖花若有重開日得見菖花亦自羞隲路隔仙源不可尋紫墻霜戟夜沉沉緘情謾託傳書鴈换笑空餘取酒金翡翠巢成珠樹密􅌐龍睡起玉淵湥新知自樂生離苦年少情多豈易禁漢武億蓬萊銀闕浪漫漫弱水回風欲到難光照竹宫勞夜拜露溥金掌費朝飱力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安筠漢武天臺切綘河半涵非霧鬱嵯峨桑田欲看他年變匏子先成此日歌夏鼎幾遷空象物秦橋未就巳沉波相如作賦徒能諷却助飄飄逸氣多惟演一曲橫汾鼓吹回侍臣高會柏梁臺金芝燁煜凌晨見青雀軒翔白晝來立候東𬈑邀鶴駕窮兵西極待龍媒井泉祭罷神光滅更遣人間識玉杯衎高宴柏梁詞可仰橫汾簫鼓樂難窮已教丞相開東閣猶使將軍誤北戎灑淚甘泉還有恨祈年仙館惜成空誰知辛苦回中道共盡千齡五柞宫任隨太常丞直集賢院棘庭深恨隔仙曹桂館蜚廉事轉勞銀闕尚沉滄海闊井幹空拂綘河高萯陽戈獵侵多稼朔塞旌旗照不毛苦信憑虛王母説東方三度竊蟠桃隲高挹方諸薦水倉醮壇時見燭神光日邉甲帳雖虛設汾上樓船不可忘􅐻概碧霄甘露白鼎遷幽壤瑞雲黃東巡岱嶽探金秉倒指寧聞壽數長宗諤建章宫闕鬱岧嶤露掌修莖倚泬寥平樂館中觀角抵單于臺上懾天驕蓬萊望氣滄波濶太一祈年紫府遙西毋不來東朔去茂陵松柏冷蕭蕭館中新蟬筠庭中嘉樹發華滋可要螳蜋共此時翼薄乍舒宫女鬢蛻輕全解羽人尸風來玉女烏先轉露下金莖鶴未知日永聲長兼夜思肯容潘嶽到秋悲億碧城青閣好追􅋽高桞新聲逐吹長貴伴金貂尊漢相淸含珠露怨齊王蘭臺密侍初成賦河朔歡逰正舉觴雲鬢翠緌徒自許先秋椘客已回腸惟演冉冉光風泛紫蘭新聲含怨日將殘自憐伴雀成團扇誰許迎秋集武冠委脫亭皋隨木葉飛緌雲表拂仙􅐻青蔥玉樹連金爵不覺醯雞競羽翰張詠樞密直學士脫塵還與比仙逰露腹何妨近品流嫩殼半遺紅藥地細聲偏傍緑楊樓詩家取象吟難盡畫格偷真意不休正好儒林擬緌紼憑欄無苦預悲秋宗諤雨過新聲出苑墻煙輕餘韻度回塘短亭踈桞臨官道平野西風更夕陽八斗陳思饒賦詠二毛潘嶽易悲涼感時偏動騷人思不問天涯與帝鄉騭搖落何須宗玉悲齊庭遺恨莫沾衣池中􅔽蓞香全減井上梧桐葉乍飛風促筝聲隨斷續日移甎影自光輝宜秋門外饒芳樹結駟那堪送客歸夜宴錢惟濟恩州刺史清宴夜何其南亭露欲晞蹁蹮霞神舞瀲灔羽觴飛鏤楶搖花落金璫照月輝瑶光未西落休賦醉言歸億􅋽宵綺宴開酃淥湛芳罍鶴蓋留飛舄珠喉怨落梅薄雲齊鬢膩流雪椘腰回巧笑傾城媚雕章刻燭催􅐻空珠有淚爐冷蕙成灰巾角彈棋勝琴心促軫哀醉羅驚夢枕愁黛怯粧臺風細傳踈漏猶歌起夜來筠玳押風簾薄金徒漏箭長食魚齊上客置醴漢元王蒟醬辛初和蓱韲冷乍嘗巢笙傳曲沃傪鼓發漁陽吟燭惟憂盡杯籌豈易防齒犀融晏雪𫀆麝薦荀香笑逐呼盧勝歌隨解佩狂遺簮兼墮珥流眄𣸪回腸綵鳯尋仙史班騅待陸郎主歡殊未巳投轄在銀牀惟演昨夜宴南堂華燈燭九光削青爭落筆舉白鬪飛觴秪覺輝裴玉寧思夢謝塘解煩多密勺藉爼半蘭芳促席風弦怨開簾月露涼􅋳顔君莫訴西北轉銀潢鶴筠碧樹隂濃扣砌平華亭歸夢曉頻驚仙經若未標竒相琴操何因寄恨聲養氣自憐雞善勝全身却許鴈能鳴芝田玉水春雲伴可淂乘軒是所榮億悵望青田碧草齊帝鄉歸路阻丹梯露濃漢苑宵猶警雪滿梁園晝乍迷瑞世鸞皇徒自許繞枝烏鵲未成棲終年巳結雲羅恨忍送西樓曉月低詠共憐潔白本天姿縱在泥塵性不卑况是稻梁猒足日好尋煙月却歸時迹參詩雅何年盡名系仙經四海知應到崑丘指來𩔶曽陪鴛鷺浴華池隨何年玉羽別崑丘飛舞長親十二樓警露夜窺瑶圃月翔雲高憶海天秋肯教渠略知遐壽會向神區更遠逰正是溶溪煙水碧好陪青鳯飲澄流惟演碧樹隂濃接玉墀幾年飛舞伴長離天淵風雨多秋意遼海煙波失舊期自許一鳴聞逈漢可隨三匝繞空枝從來腐鼠何曽顧不似鵷雛枉見疑公子夾道青樓拂綵霓月軒宫袖案前溪錦鱗河伯供烹鯉金距鄰翁逐鬪雞細雨墊巾過桞市輕風側帽上銅堤珊瑚擊碎牛心熱香棗蘭芳客自迷筠油壁春車隔渭橋黃山路逺苦相邀行庖㸑蠟雕胡熟永埓鋪金汗血驕别館橫陳張靜婉期門長揖霍嫖姚注鉤握槊曽無憚緑桂膏濃曉未銷惟演蓮勺交衢接荻園來時十里一開筵歌翻南國桃桹曲馬過章臺杏葉韉别殿對回雙綬貴後門歸夜九枝然間隨翠􅎻欹烏帽紫陌三條入桞煙舊將億平生苦戰憶山西拊劒臨風氣吐霓戟戶當衢容駟馬髯奴繞帳列生犀新豐酒滿清啇咽武庫兵銷太白低髀肉漸生衣帶緩早朝空聽汝南雞筠丈八蛇矛戰血乾子孫今巳列材官青煙碧瓦開新第白草黃雲廢舊壇勞薄可甘先藺舌爵高還許戴劉冠秋來從獵長楊榭矍鑠猶能一據鞍隨幾年鏖虜𣸪征蠻分閫功成兩鬢班新畫儀形當漢閣舊銘勳業在燕山龍泉照步文犀澀馬埒堆金駿足間時泰無因問充國曉窗風雪夢陽關騭疆弩當年討不庭功成身退炳丹青囊沙澤畔知兵法聚米山前識陳形驥老未甘秋伏櫪劍間猶覺夜衝星分茅錫土傳家諜鍾鼎還須為勒銘宣曲二十二韻宣曲更衣寵高堂薦枕榮十洲銀闕峻三閣玉梯橫鸞扇裁紈製羊車插竹迎南樓看馬舞北埭聽雞鳴綵縷知延壽靈符為辟兵粟眉長占額蠇髮俯侵纓蓮的沉寒水芝房照畫楹麝臍薰翠𬒳鹿瓜試銀筝秦鳯來何曉燕蘭夢未成絲囊晨露濕椒壁夜寒輕綺假餘霞散瑶林密雪晴流風祕舞罷初日靚粧明雷響金車度梅殘玉管淸銀鐶添舊恨瓊樹怯新聲