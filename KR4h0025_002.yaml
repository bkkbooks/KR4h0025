馺娑别舘度儲胥薄暮來金埒凌晨上玉除寧同起窮巷䞉欲賦愁予秉何處来蘋末蕭騷盡四隣金莖吹曉露玉宇動輕塵易水離歌闋齊紈怨思新泛蘭迷舊澤落㡌㑹佳辰籬菊飄香遠庭桐墜葉頻㠶𨳩五湖客槎去九霄人曲沼鋪紋簟平蕪偃綠茵鴻飛資羽翮鷹撃助精神仙馭歸堪待琴松韻更真披襟同楚樹千古自相親戊申年七夕五絶筠伯勞東翥燕西飛又報黄姑織女期天帝聘錢還得否晉人求富是虚辭道書云牽牛娶織女取天帝錢二萬備禮乆而不還𬒳驅在營室華寝星陳夜未央眀河奕奕度神光一年暫淂停機杼不柰秋蟲促織忙吹笙何處伴乗鸞窺牗誰人見阿環便有唐家今夕意月和風露滿􅌐山浙浙風㣲素月新鵲橋横絶飲牛津豈惟蜀客知踪跡更問庭中曬腹人琥車芝駕儼清秋㣲雨侵宵助涕流人世莫嗟離恨苦却應天上更悠悠億六幕西廻斗轉車鮮雲點綴玉鈎斜天孫巳度黄姑渚阿母還來漢帝家明河左界鵲南飛漢苑高樓正曝衣一夕匆匆停弄杼誰将錦石暫支機蘭夜沉沉鵠漏移羽車雲幄有佳期應将機上囘文縷分作人間乞巧絲神女歡娯一夕休月娥孀獨巳千秋争如靈匹年年㑹莫恨牛津隔鳯輈玉女壺傾笑電頻白榆晴影接星津神光奕奕雲容薄誰見凌波襪起塵惟演烏鵲飛來接斷雲秪貪清淺度星津不知一夜支機石却屬乗槎上漢人玉露金河顥氣凉辛夷車轉桂旗香嫦娥可是多猜忌不駐瓊輪放夜長一歳佳期一夕過羽旗雲盖渉㣲波明朝若寄相思淚玉枕金莖得最多青鳥當時下紫雲綺嚢書祕露桃新莫嫌夜半移床遠朱雀窓中别有人驪阜凌雲對玉鈎千門高切綘河秋欲聞天語猶嫌遠更結三層乞巧樓映月放冰輪傍絳河相期寳婺夜經過嫦娥不惜宫中桂乞與天香分外多碧天如水月如鈎金露盤高玉殿秋青鳥潜來報消息一時西望九花虬漢殿初呈楚舞時月臺風榭鎮相隨如何牛女佳期夕又待鑾輿百子池月露庭中錦繡筵神光五色一何鮮世間工巧如求得四至卿曹亦偶然銀河耿耿露漙漙彩縷金針玉佩環天媛貪忙為靈匹㡬時留巧與人間秉斜漢西傾桂魄新停梭今夕度天津世間縦有支機石誰是成都賣卜人紅蕖爛熳碧池香羅綺三千侍漢皇阿毋暫來成底事茂陵宫桂巳蒼蒼香堦寳砌静無塵遥指星河再拜人若把離情今夕說世間生死最傷神北斗城高禁漏多漢家宫殿奏笙歌漫教青鳥傳消息金簡長生淂也麽珠箔風輕月似鈎還㸔錦繡結高樓堪傷乞巧年年事未識君王巳白頭秋夕池上惟演珪月上金塘烟容帶水光朱華接蘭坂緑荇溢魚防叢暗禽棲宻林踈露下􅋽秋懐巳潘鬢無柰更啼螿億蓮塘帶弋林清吹滌煩襟泉咽猶鳴玉臺傾舊築金僵桃蟲自蠧恠石蘚交侵此夜悲秋客烟蛩亦伴吟偶作億翹車橤佩謁明光禁籞多年費稻粱秪羡埿塗龜曵尾翻嫌霧雨豹成章鳴鳩春㝅先疇廢寒蝶秋菘老圃荒歸計未成芳節晚更憂禽鹿頓纓狂筠殺青和墨度流年飽食無功鬂颯然却憶侯封安邑棗不能兄事魯褒錢千峰月白猿啼樹六幕風高鶚在天招隱詩成誰撃節願傾家醸載漁船螢筠荒郊多腐草故苑近淸秋棘宻何勝數囊輕莫盡收月高疑爝息天遠認星流紫桂風㣲急紅蘭露徧浮巳䏻穿永巷更𣣔拂高樓㓕燭方無寐鳴蛩相薦愁億爽籟生遥圃斜暉落半岑㣲苑浮草際零亂起墻隂武子窓塵積隋家苑樹深燈光透踈隟珠彩射清潯野燐宵争出星榆暁共沉長門秋漏永偏照淚涔涔西崑詶唱集卷下
