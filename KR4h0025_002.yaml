front:
  text: 西崑酬唱集卷下
  hash: sha256:20085c0458ff4558851504dcee449496216fb1e10c793ca5b67eb55555d46501
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0025_SBCK_002-1a}
body:
  text: 寄靈仙觀舒職方學士億緑髮郎潛不記年却尋丹竈味靈篇華隂學霧還成市彭澤橫琴豈要弦曉案秪應餐沆瀣夜灘誰見弄潺湲須知吏隱金門客待乞刀圭作地仙惟演方瞳玄鬢粉闈郎綘闕齋心奉紫皇徵士高懷雲在嶺騷人秋思水周堂間園露草開三徑靈宇華燈燭九光知有美田堪種玉幾時春渚逐歸艎筠石渠仙署久離群抗迹丹臺世絶倫楊子不甘嘲尚白􅃮園終許自全真紫煙深處鸞雙舞朱髓成來鳥共伸若向雲中見雞犬可能渾忘姓劉人答內翰學士舒雅祕閣校理監舒州靈仙觀清貴無過近侍臣多情猶憶舊交親金蓮燭下裁詩句麟角峯前寄隱淪和氣忽飄燕谷暖好風徐起謝庭春緘藏便是山家寶留與兒孫世不貧答錢少卿蓬萊閣下舊都居偶别俄驚四載餘每見寒葭思倚玉忽臨秋水淂雙魚人間貴盛君誰及物外優間我自餘聞認歸艎向春渚深知不與道情踈答劉學士往歲别京畿樓山與衆違君心似松柏鴈足寄珠璣學道情雖篤燒丹力尚微雲中雞犬在秪候主人歸宋玉億蘭臺清吹拂冠緌剃草新居對渺瀰麗賦朝雲無處所羈懷秋氣動齎咨三年送目愁鄰媛七澤迷魂怨椘詞獨有江南哀句在更傳餘恨到黃旗筠楚國驕荒日巳深山川朝暮劇登臨曽傷積毀亡師道秪託微辭蕩主心江草東西多恨色峽雲高下結層隂潘郎千載聞遺韻又説經秋思不任惟演章華淸宴重遊陪巳有微詞更有才神女夢靈因賦感屈平魂怨待招回悲秋終古情難盡鄣袂何時望可來秪用大言君自許景差無計上蘭臺送客不及筠靑門祖帳曙煙微片席乘流鳥共飛曲岸馬嘶風嫋嫋短亭人散桞依依灞陵目斷猶回望楚水魂銷為送歸秪自河梁傳怨曲洛塵千古化征衣惟演橋闊川長恨已多班騅嘶斷隔雲蘿遙山幾疊迷朱斾芳草經時駐玉珂高鳥可能追夕照緑楊空自拂微波短轅白鼻何由淂目送層樓一鴈過筠日上旗亭第五重百壺春釀與誰同黃山遠隔奔霄騎紫塞孤飛避弋鴻湘竹幾時休染淚楚旌終日自搖風此情不及歌楊桞一尺魚書萬水中夕陽筠夕陽堪極目况𣸪近秋殘塞逈橫煙紫江清照葉丹伍胥嗟路遠潘子念行難更有蕪城恨城空逼夜寒億夕籟起汀葭秋空送目賒緑蕪平度鳥紅樹逺連霞水闊迷歸棹風清咽逈笳高樓未成下天際玉鈎斜惟演逺色連高樹回光射逈樓自翻歸鴈影更急思蟲愁煙暝長先隔霞烘允未收華燈知可繼惟照洞房幽樞密王左丞宅新菊億中樞多暇日小圃占秋光雕玉新成檻繁金乍泛觴陶籬侵桞色羅宅掩蘭芳芝影連虛室萱叢接後堂傳巖猶借雨豐嶺未飛霜溫樹遍分蔭藝籖亦鬪香交枝迷露井墜葉點橫塘桐録知延壽千齡奉紫皇筠東閣留嘉客寒葩豔晚光秋風自蕭瑟台座對熒煌麗奪雙南價清含九畹香嵰州霜薦味太液鵠分裳巳助蜂成蜜還隨蟻泛觴俯臨輝艾綬佩服間茰房節物傳荆俗詩情掩謝塘更期松偃蓋永奉太清方惟演賀燕翻飛地靈芳茂遂時隂連桃李徑潤接鳯凰池夕照揮金葆輕風拂翠㽔露珠清自沍煙素引還披西皓霜雖徑南榮暖更滋擷芳多楚澤淂地勝陶籬味可登蘭籍香應奪桂旗願公長却老宴寢奉瓊巵維青規前席暇歸沐興何長北第秋將晚東籬菊正芳幽叢霏薄霧桂色豔輕霜已近黃金印兼臨白玉堂甘疑掩平實秀肯讓芝房有佞還應指無憂可要忘蘂浮丞相酒氣馥令君香好固松椿壽仙經識祕方直夜億繚垣嶤闕慶雲深畫燭燻爐對擁衾三殿夜籖傳漏箭九秋霜籟入風琴階前稿葉驚寒雨天際􅓡鴻答逈砧欹枕便成魚鳥夢豈知名路有機心惟演千廬徼道發傳呼帝宇沉沉璧月孤重橑秪聞喧鬪鼠危枝誰見繞驚烏石螭霜重連鈎盾玉虎冰消下轆轤素髮自憐同騎省一竿何日釣秋鱸筠雞人肅唱發章溝漢殿重重虎戟稠綷羽欲棲溫室樹金波先上結麟樓風來太液聞鳴鶴霧卷明河見飲牛萬國表章頻奏瑞手批天語思如流洞戶億洞户飛甍接綺寮一春幽恨寄蘭苕書題枉是藏三歲壺矢誰同賽百嬌水國風霜凋杜橘仙山雲霧隔江潮東城劒騎何曽出秪為離愁髀肉銷筠百尺青樓大道邉五陵逰騎驍翩翩不思夜魄過三五秪問春醪賞十千密鎖香雲深處户亂飄梨雪晚來天愁眉豈待歌成傪咫尺河陽信未傳柳絮億瓊蘂飄英逐吹繁建章飛舞入千門羌人自怨殘梅曲莊叟還迷夢蝶魂漢苑風光隨獵騎洛城花雪撲離樽錦帆蔽日隋堤逺枉逐東流箭浪翻筠半減依依學轉蓬班騅無奈恣西東平沙千里經春雪廣陌三條盡日風北斗城高連蠛蠓甘泉樹密蔽青蔥漢家舊苑眠應足豈覺黃金萬縷空惟演三月江南花漸稀春隂漠漠雪霏霏章臺街裏翩輕吹灞水橋邉送落暉陸凱傳精梅暗落韓慿遺恨蝶爭飛詔書漫道吹綸薄誰見紛紛上客衣與客啓明惟演越溪微霰灑寒梅家近嚴陵古釣臺夢欲成魚通夕去書曽慿犬隔秋回干時不為侏儒米樂聖猶銜叔夜杯帝右豈無楊淂意漢宫須薦長卿才億越客逃名誤鑿坯漢庭初聘碧雞才操心四十知無惑削牘三千耻自媒吟苦多年依洛社賦成他日上蘭臺郡齋懸榻流塵滿七見東風落椘梅筠秦痔從來易得車郤枝今比我何如垂天借喻齊諧志握火尋盟越絶書旭日西清雲幄密朔風南陌葦衣踈故山夜鶴空多怨金屋人爭誦子虛無題億巫陽歸夢隔千峰辟惡香銷翠𬒳空桂魄漸虧愁曉月蕉心不展怨春風遙山黯黯眉長斂一水盈盈語未通漫託鵾弦傳恨意雲鬟日夕似飛蓬惟演綘縷初分麝氣濃絃聲不動意潛通圎蟾可見還歸海媚蝶多驚欲御風紈扇寄情雖自潔玉壺盛淚秪凝紅春窗亦有心知夢未到鳴鐘巳旋空譯經光梵大師億薪火滅雙林誰傳七佛心譯筵香篆絶經葉蠹魚侵猊座雲雷歇龍宫歲月深青蓮流半偈白馬度千岑大士招提啓明君羽葆臨對翻天竺字助發海潮音空界花成雨仁祠地布金九旬談妙理三接簡宸襟淨社延居士生臺集野禽琅函香拂𬒮奈苑樹交隂文字蹄求兔機緣芥值針龍華他日會應記洛生吟筠漢夢通西域逍遙廣舊園竺乾方演教金粟豈忘言硯滴寒蟾吐臺香瑞獸噴揮毫花滿裓隱几雪盈門大士淸歌發南宗密印存縱橫十二部慧日破重昏霜月惟演霜月正如鈎臨池更上樓沈侯新覺瘦宋玉舊多愁獺髓分膏密鵝毛寫恨稠長懷寄歸鴈歸鴈自悠悠億月夕露為霜心知厭獨房吟殘猶擁鼻望極自回腸鬢減前秋緑衣消外國香星津誰待報織素未成章筠霜曉月仍殘桐踈鳯更單已傷春寂寂還踏夜漫漫凍合仙槎路薰餘侍史蘭郍知荀奉倩體薄不勝寒維銀床葉暗飄霜月夜迢迢寒極金難辟憂多酒漫銷荀爐殘更換湘瑟罷仍調誰道河流淺盈盈萬里遙此夕億此夕秋風獵敗荷玉鈎斜影轉庭柯鮫人淚有千珠迸椘客愁添萬斛多錦里琴心誰滌器石城桃葉自橫波程鄊酒薄難成醉帶眼頻移奈瘦何惟演曲瓊斜挂影沉沉火齊屏風六曲深春瘦巳寬連理帶夜長誰有辟寒金珠拋月浦空􅉼淚琴怨蘭堂漫寄心碧玉可能攀貴德阮郎追騎更駸駸筠南州石黛有遺妍目極危梯月上弦一水相忘空脈脈雙金何路致拳拳仙源日永桃無援客館春輕桞未眠欲寫微詞託歸鴈風高嶺闊又絰年劉校理屬疾億北窗風徑雪雲繁移疾端居避世喧載酒誰過楊子宅張羅休署翟公門多才最許飄飄氣少别還銷黯黯魂促爾徘徊憶真賞逺天新月照黃昏筠撫枕凄然掩北軒漢庭誰問馬文園風簷鴟嘯厨煙絶月樹烏驚藥杵喧戲習五禽成妙術學虧一簣阻微言不因九奏清塵耳天路應迷簡子魂勸石集賢飲億日上三竿宿霧披章臺走馬帽簷欹秪傳祖席觴無算肯顧尚書對有期藝省翻經終寂寞桞堤飛鞚好追隨靈均不醉真何益千古離騷怨椘辭宗諤都門祖軷綺筵張舉白無由訴羽觴石室紬書勤亦至金貂換酒醉何妨甕間吏部寧須問席上車公不可忘應念朝來猶眊矂解酲誰用蔗為漿筠豪家抱甕擅風流更燎薰爐白雪樓魯筆休分科斗字蜀都且換鷫鸘裘仰天拊髀真為樂倒戴穿腸肯易愁欲鱠長鯨置雕爼願回北斗挹東流即目億急雨度前軒池荷相對翻峰竒雲待族蹊暗李無言掩鼻生愁詠披襟爽醉魂一壥今巳廢猶戀漢庭恩筠地僻無車轍心灰欲坐忘疾雷徒破柱幽草不迎涼日烈蟬遺蛻花休蜜滿房覆觴知巳久寧有次公狂燈夕寄獻內翰號略公惟演嶢闕翬飛河漢傍鈎陳遙認赭𫀆光九枝火樹連金狄萬里霜輪上碧璫匝地行車珠網細照天晨燎紫沉香秪聞鼇嶺神仙客再拜雲邉捧壽觴億瓊樓十二玉梯斜乾鵲南飛轉斗車有客郢中歌白雪幾人天上醉流霞金吾緹騎章臺陌素女繁弦太帝家秦痔未痊齋閣掩夢回宫樹巳啼鴉宗諤東城南陌盡逰人陌上香車起暗塵歷歷星榆光奪晝煌煌火樹豔爭春章溝五鼓催行樂衛尉千廬罷徼巡應念鼇山方併宿紫泥封後獨頻伸筠千輪佛火照層城九陌香車擊迅霆簡子最知天帝樂孟家惟信紫姑靈金徒抱箭催壺水玉宇來風滿砌蓂簾卷交疏蓮燭密通中枕上獨聞鈴李舍人獨直億閣鳯巢髙拂綵霓王芝香雜武都泥十行漢札如絲出六幕堯天倚杵低露井氷銷垂素綆仙莖日轉射琁題赫蹄雲落知誰見餘力何妨頌碧雞筠卿靄重重覆璧門獨揮鴻筆坐西垣誠眀自有中和氣潤色還多郁穆言內苑朱櫻兼酪賜前階紅藥任風翻紫絲新履徊翔地應笑東方避世喧無題二首億銅􅐻蕙草起青煙斗帳香囊四角懸沈約愁多徒自瘦相如意密有誰傳金塘雨過猶疑夢翠袖風回秪恐仙日上秦樓休寄詠東方千騎擁輜軿露冷星翻月上弦九枝銀燭照金鈿應知韓椽偷香夜猶記潘郎擲果年天上明河雖可望苑中髙桞未經眠烏啼人散青樓曉堂下輕風轉策錢筠曽許千金答浣紗越溪浪淺不通槎曉樓簾卷還凝霧外院墻低却映花滿目離愁頻駐馬一春幽夢秪驚鴉柔桑蔽日南城路懊惱羅敷自有家昱爚銀鞍狹路逢長裙連帶任流風身輕近識吳宫燕目斷還驚洛浦鴻未許香囊安肘後獨憐丹枕在房中南園蝴蝶飛無限一一雌隨一一雄懷舊居億武夷仙穴近吾廬鬪鴨欄摧菌閣虛千匹歲儲妨種橘百金春事廢觀漁北山煙霧迷歸轍南陌風塵化客𥚑堂上金絲應巳歇豈惟蘭菊舊叢踈惟演武祀仙壇接里閭琴堂水閣半凌虛竹林舊享銅􅐻食門巷今容駟馬車楚國大言登宋玉漢家答詔用相如未知笳鼓歸何日空鎖鱣庭春草踈筠毛竹千叢蔽野亭曉猿驚後亂峰青漢庭巳奏三千牘周室仍翻十二經紫殿深沉頻視草緇帷寂寞自飛螢振衣本為蒼生起肯向荀家秪聚星偶懷億銀礫飛晴霰蘭英湛凍醪年光侵葆髮春恨寄雲𫀆燕重銜泥逺鴻驚避弋高平生林壑志誤佩吕虔刀筠不才甘客難多病豈旬休可待乘軒寵終慙舐痔求渚蘭薰露夕江橘富霜秋飬拙寧無地千波一葉舟許洞歸吳中億春渚歸艎不暫留青絲如葆恐逢秋騷人已得江山助賦客終陪霰雪逰三徑未荒休歎鵩十將先饋定驚鷗洞庭霜橘疁田粟歲計猶堪比徹侯筠欲折瑶華向緑疇風光滿目盡離愁茂林修竹多嘉客萬壑千巖憶舊逰漢詔巳聞求泛駕禰狂無自屈岑牟荆山待價何憂晚龜手猶期裂地酬惟演草薰風暖接長亭一曲􅌐歌倒醁醽懷古更投玄石賦艤舟間採紫莖萍醉拋隋岸楊花白吟過淮山桂樹青可使長離終鎩羽淵雲辭藻掞天庭上巳玉津園賜宴筠需雲分渥澤禊飲恣歡遊緹幕侵晨設蘭泉對席流蕙肴清萐莆玉醴湛金甌春服萋萋盛光風灔灔浮桐華穠競發鶯語巧相求妙曲新聲合斜陽醉未休億禊飲逢元巳春遊盛舞雩流杯傳椘俗飫賜出堯厨玉樹天開苑銀潢水貫都肆筵環曲沼飛蓋塞交衢洛邑聲詩逸蘭亭歲月徂顔王有遺韻待子一操觚惟演漢家傳洛